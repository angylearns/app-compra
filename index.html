<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Lista de la Compra</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>

<body>
  <div id="welcomeScreen" class="welcome-screen">
    <div class="welcome-card">
      <h1 class="welcome-title">Acceso Protegido</h1>
      <p class="welcome-subtitle">Introduce la contraseña de acceso global</p>
      <form id="welcomeForm" class="welcome-form">
        <input type="password" id="welcomeInput" required class="welcome-input" autocomplete="off"
          placeholder="Contraseña">
        <button type="submit" class="welcome-button">Acceder</button>
      </form>
    </div>
  </div>

  <div id="mainApp" class="app-container hidden">
    <header class="app-header">
      <div class="header-top">
        <button id="toggleHeaderBtn" style="
  width: 20%; 
  padding: 0.25rem; 
  background-color: rgb(239, 235, 235); 
  border: none; 
  border-radius: 0.5rem; 
  font-size: 1.5rem; 
  color: #007aff; 
  cursor: pointer; 
  display: block; 
  margin-top: 0.5rem;
">↕</button>
        <h1 class="app-title" style="flex:1;">Mi Compra</h1>
        <button id="changeListBtn" class="change-list-btn">Cerrar Sesión</button>
      </div>

      <nav class="app-tabs">
        <button id="tabTemplate" class="tab-btn active">Todo</button>
        <button id="tabCurrent" class="tab-btn">Compra</button>
      </nav>

      <div id="controlsWrapper" class="controls-wrapper">
        <div id="templateControls" class="control-group">
          <form id="addItemForm" class="add-item-form">
            <input type="text" id="newItemInput" placeholder="Añadir producto" required class="item-input"
              autocomplete="off">
            <input type="text" id="tagInput" placeholder="C, D, M" class="tag-input" maxlength="1" autocomplete="off">
            <button type="submit" class="add-button">Añadir</button>
          </form>
        </div>
        <div class="search-section">
          <input type="text" id="searchInput" placeholder="Buscar producto" class="search-bar" autocomplete="off">
          <button id="clearSearchBtn" class="clear-search-btn">✕</button>
        </div>
        <div class="filter-action-container">
          <div class="tag-filters">
            <button class="filter-tag-btn active" data-tag="">Todos</button>
            <button class="filter-tag-btn" data-tag="C">C</button>
            <button class="filter-tag-btn" data-tag="D">D</button>
            <button class="filter-tag-btn" data-tag="M">M</button>
            <button class="filter-tag-btn" data-tag="G">G</button>
          </div>
          <div id="currentListActions" class="actions-panel-top hidden">
            <button id="finalizePurchaseBtn" class="finalize-btn">Terminar compra</button>
          </div>
        </div>
      </div>
    </header>

    <main class="list-container">
      <p id="emptyState" class="empty-state">No hay productos cargados</p>
      <ul id="templateList" class="product-list-grid"></ul>
      <ul id="shoppingList" class="product-list-grid hidden"></ul>
    </main>

    <div id="notification" class="notification" role="alert"></div>
  </div>
  <script src="app.js"></script>
</body>

</html>
