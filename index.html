<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Lista de la Compra</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <h1 class="app-title">Lista de la Compra</h1>
      <div class="import-section">
        <input type="file" id="fileInput" accept=".md" class="file-uploader">
      </div>
      <div class="add-item-section">
        <form id="addItemForm" class="add-item-form">
          <input type="text" id="newItemInput" placeholder="Anadir alimento..." required class="item-input">
          <button type="submit" class="add-button">Anadir</button>
        </form>
      </div>
      <div class="search-section">
        <input type="text" id="searchInput" placeholder="Buscar producto..." class="search-bar">
      </div>
    </header>
    <main class="list-container">
      <p id="emptyState" class="empty-state">Anade productos manualmente o carga un archivo .md</p>
      <ul id="shoppingList" class="product-list"></ul>
    </main>
    <div id="notification" class="notification" role="alert"></div>
  </div>
  <script src="app.js"></script>
</body>
</html>
